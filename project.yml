name: EisenMat
options:
  bundleIdPrefix: com.langseth
  deploymentTarget:
    iOS: "17.2"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: YES
    DEVELOPMENT_TEAM: ""

targets:
  EisenMat:
    type: application
    platform: iOS
    sources:
      - path: EisenMat
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.langseth.eisenmat
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: EisenMat
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: EisenMat/EisenMat.entitlements
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - target: EisenMatWidget
        embed: true

  EisenMatWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: EisenMatWidget
        excludes:
          - "**/.DS_Store"
      - path: EisenMat/Models/TaskItem.swift
      - path: EisenMat/Models/Tag.swift
      - path: EisenMat/Models/Quadrant.swift
      - path: EisenMat/Shared/ModelContainer+Shared.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.langseth.eisenmat.widget
        CODE_SIGN_ENTITLEMENTS: EisenMatWidget/EisenMatWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: EisenMatWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: EisenMat
        SKIP_INSTALL: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"

  EisenMatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EisenMatTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.langseth.eisenmat.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: EisenMat

schemes:
  EisenMat:
    build:
      targets:
        EisenMat: all
        EisenMatWidget: all
    test:
      targets:
        - EisenMatTests
